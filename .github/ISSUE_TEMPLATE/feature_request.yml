name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你期望的功能。

  - type: dropdown
    id: category
    attributes:
      label: 功能类别
      options:
        - "语音识别（ASR / 热词 / 纠错）"
        - "输入输出（文字输入 / Typewriter / 键盘命令）"
        - "界面交互（浮动球 / 设置面板 / 托盘）"
        - "选区指令（润色 / 翻译 / AI 对话）"
        - "系统集成（热键 / 权限 / 兼容性）"
        - "性能优化"
        - "其他"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 遇到的问题或需求场景
      description: 描述你在什么情况下需要这个功能
      placeholder: 在游戏中使用时，希望能...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你理想中的功能行为
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 其他可能的解决思路（可选）
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 已搜索现有 Issues 未找到类似建议
          required: true
